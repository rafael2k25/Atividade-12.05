<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastroTarefa.css">
    <title>Cadastro de Tarefas</title>
</head>
<body>
    <div class="container">
        <h2>Cadastrar Tarefa</h2>
        <form id="cadastroTarefa">          
            <label for="descricao">Descrição: </label>
            <input type="text" name="descricao" id="descricao">
            <label for="status">Status: </label>
            <input type="status" name="status" id="status">
            <input type="submit" value="Cadastrar tarefa">
        </form>
        <a href="index.html" class="btn linkBtn">
            Consultar tarefas
        </a>
        <button id="Logout">
            Logout
        </button> 
        <div id="respostaTarefa"></div>
    </div>
    <script src="scriptTarefa.js"></script>
</body>
</html>
