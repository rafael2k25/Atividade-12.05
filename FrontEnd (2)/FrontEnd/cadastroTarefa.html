<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastroTarefa.css">
    <title>Cadastro de Tarefas</title>
</head>
<body>
    <div class="container">
        <h2>Cadastrar Tarefa</h2>
        <form id="cadastroTarefa">          
            <label for="descricao">Descrição: </label> <br>
            <input type="text" name="descricao" id="descricao"> <br> <br>
            <label for="status">Status: </label> <br>
            <input type="status" name="status" id="status"> <br> <br>
            <input type="submit" value="CadastrarTarefa">
        </form>
        <div id="respostaTarefa"></div>
    </div>
    <script src="scriptTarefa.js"></script>
</body>
</html>
